<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.min.css" />
    <title>Lyria</title>
  </head>
  <body>
    <header class="header">
      <a class="header__logo-link" href="#">lyria</a>
      <button class="header__burger" aria-label="Toggle navigation">
        <span class="header__burger-line"></span>
        <span class="header__burger-line"></span>
        <span class="header__burger-line"></span>
      </button>
      <nav class="header__nav">
        <ul class="header__unlist">
          <li class="header__list">
            <a class="header__list-link" href="#">home</a>
          </li>
          <li class="header__list">
            <a class="header__list-link" href="#">about us</a>
          </li>
          <li class="header__list">
            <a class="header__list-link" href="#">contact us</a>
          </li>
          <li class="header__list">
            <a class="header__list-link" href="#">menu</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero-section">
        <img
          class="hero-section-image"
          src="./img/lyria-hero.jpg"
          alt="lyria artist"
          loading="lazy"
        />
        <h1 class="hero-section-title title-big">
          <span>l</span><span>y</span><span>r</span><span>i</span><span>a</span>
        </h1>
        <div class="hero-section-block">
          <div class="hero-section-description paragraph">
            <p>
              Unrehearsed. Unscripted. Unpredictable. A home for the sonic
              adventurers and the stories that linger after the last note fades
            </p>
          </div>
          <div class="hero-section-menu">
            <button class="button">spotify</button>
            <button class="button">apple podcast</button>
            <button class="button">youtube</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
