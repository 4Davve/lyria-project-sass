<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.min.css" />
    <script src="./js/burger-menu.js" defer></script>
    <title>Lyria</title>
  </head>
  <body>
    <header class="header">
      <a class="header__logo-link" href="#">lyria</a>
      <button class="header__burger" aria-label="Toggle navigation">
        <span class="header__burger-line"></span>
        <span class="header__burger-line"></span>
        <span class="header__burger-line"></span>
      </button>
      <nav class="header__nav">
        <ul class="header__unlist">
          <li class="header__list">
            <a class="header__list-link" href="#">home</a>
          </li>
          <li class="header__list">
            <a class="header__list-link" href="#">about us</a>
          </li>
          <li class="header__list">
            <a class="header__list-link" href="#">contact us</a>
          </li>
          <li class="header__list">
            <a class="header__list-link" href="#">menu</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero-section">
        <video
          class="hero-section-video-bg"
          autoplay
          muted
          loop
          playsinline
          preload="metadata"
        >
          <source src="./img/lyria-hero.mp4" type="video/mp4" />
          <source src="./img/lyria-hero.webm" type="video/webm" />
        </video>
        <!-- <img
          class="hero-section-image"
          src="./img/lyria-hero.jpg"
          alt="lyria artist"
          loading="lazy"
        /> -->
        <h1 class="hero-section-title title-big">
          <span>l</span><span>y</span><span>r</span><span>i</span><span>a</span>
        </h1>
        <div class="hero-section-block">
          <div class="hero-section-description paragraph">
            <p>
              Unrehearsed. Unscripted. Unpredictable. A home for the sonic
              adventurers and the stories that linger after the last note fades
            </p>
          </div>
          <div class="hero-section-menu">
            <button class="button">spotify</button>
            <button class="button">apple podcast</button>
            <button class="button">youtube</button>
          </div>
        </div>
      </section>
    </main>
    <div class="burger-menu" hidden>
      <div class="burger-menu__container">
        <div class="burger-menu__header">
          <div class="burger-menu__header-block">
            <a class="burger-menu__logo-link" href="#">lyria</a>
            <button class="burger-menu__btn-close" aria-label="Close menu">
              <span></span>
              <span></span>
            </button>
          </div>
        </div>
        <div class="burger-menu__main">
          <nav class="burger-menu__nav">
            <ul class="burger-menu__unlist">
              <li class="burger-menu__list">
                <a class="burger-menu__list-link" href="#">home</a>
              </li>
              <li class="burger-menu__list">
                <a class="burger-menu__list-link" href="#">about us</a>
              </li>
              <li class="burger-menu__list">
                <a class="burger-menu__list-link" href="#">contact us</a>
              </li>
            </ul>
          </nav>
        </div>
        <div class="burger-menu__social">
          <button class="burger-menu__social-spotify">
            <svg class="icon-spotify" width="16" height="16">
              <use href="assets/social/sprite.svg#icon-spotify"></use>
            </svg>
            spotify
          </button>
          <button class="burger-menu__social-apple">
            <svg class="icon-apple-music" width="16" height="16">
              <use href="assets/social/sprite.svg#icon-apple-music"></use>
            </svg>
            apple podcast
          </button>
          <button class="burger-menu__social-youtube">
            <svg class="icon-youtube" width="16" height="16">
              <use href="assets/social/sprite.svg#icon-youtube"></use>
            </svg>
            youtube
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
